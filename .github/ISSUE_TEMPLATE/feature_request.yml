name: 我有一个建议
description: 提出新功能、页面改进或使用体验建议
title: '建议：'
labels: ['enhancement']
body:
  - type: textarea
    id: idea
    attributes:
      label: 你希望增加或改进什么？
      description: 用日常语言描述你的想法。
      placeholder: 例如：希望图库可以按拍摄地点筛选，或者 Wiki 页面可以显示最近编辑记录。
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 为什么这个建议有用？
      placeholder: 例如：这样查找图片会更快，或者新用户更容易理解页面内容。
    validations:
      required: false
  - type: input
    id: page
    attributes:
      label: 和哪个页面或功能有关？
      placeholder: 例如：首页、Wiki、图库、音乐、搜索、个人中心
    validations:
      required: false
  - type: textarea
    id: example
    attributes:
      label: 有没有参考例子？
      description: 可以贴截图、链接，或描述你见过的类似功能。
    validations:
      required: false
  - type: dropdown
    id: urgency
    attributes:
      label: 你觉得它有多重要？
      options:
        - 有空再做
        - 比较有用
        - 很影响使用
    validations:
      required: false
