# ============================================================================
# Security Scanning Workflow
# ============================================================================
# 功能：
#   1. 依赖漏洞扫描 (npm audit) - 检测 npm 依赖中的已知漏洞
#   2. CodeQL 代码安全分析 - 静态分析检测代码层面的安全问题
#
# 触发条件：
#   - push 到 main 分支
#   - PR 到 main 分支
#   - 每周一凌晨 2:00 UTC 定时扫描
#   - 手动触发 (workflow_dispatch)
#
# 输出：
#   - SARIF 格式上传到 GitHub Security tab
#   - PR 中展示安全扫描结果摘要
# ============================================================================

name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
  schedule:
    # 每周一 UTC 02:00 (北京时间 10:00) 运行深度安全扫描
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      full_scan:
        description: '运行完整的深度扫描（包含 CodeQL 完整分析）'
        required: false
        default: false
        type: boolean

# 最小权限原则：只授予必要的权限
permissions:
  contents: read
  security-events: write  # 用于上传 SARIF 结果到 Security tab
  pull-requests: write    # 用于在 PR 中显示结果
  actions: read           # 用于读取 workflow 状态

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ==========================================================================
  # Job 1: 依赖漏洞扫描
  # ==========================================================================
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm ci --legacy-peer-deps --ignore-scripts || {
            echo "Warning: npm ci failed, attempting npm install as fallback"
            npm install --legacy-peer-deps --ignore-scripts || true
          }
          
          # Verify node_modules exists
          if [ -d "node_modules" ]; then
            echo "✓ node_modules directory exists"
            ls node_modules/ | head -5
          else
            echo "⚠️ node_modules not found, audit may be limited"
          fi

      # ------------------------------------------------------------------
      # npm audit: 扫描已知依赖漏洞 (非阻塞 - 始终成功退出)
      # ------------------------------------------------------------------
      - name: Run npm audit
        id: npm-audit
        run: |
          set +e
          echo "=== Running npm vulnerability audit ==="
          npm audit --json > audit-results.json 2>&1
          AUDIT_EXIT_CODE=$?
          echo "npm audit exit code: $AUDIT_EXIT_CODE"

          if [ ! -f audit-results.json ] || [ ! -s audit-results.json ]; then
            echo '{"vulnerabilities":{}}' > audit-results.json
            echo "No valid audit results, using empty template"
          fi

          node -e "
          const fs = require('fs');
          let data;
          try { data = JSON.parse(fs.readFileSync('audit-results.json', 'utf8')); }
          catch(e) { data = { vulnerabilities: {} }; }
          let summary = { critical: 0, high: 0, moderate: 0, low: 0, info: 0, total: 0 };
          if (data.vulnerabilities) { for (const [pkg, vuln] of Object.entries(data.vulnerabilities)) { summary[vuln.severity] = (summary[vuln.severity] || 0) + 1; summary.total++; } }
          else if (data.advisories) { for (const advisory of Object.values(data.advisories)) { summary[advisory.severity] = (summary[advisory.severity] || 0) + 1; summary.total++; } }
          console.log('=== Vulnerability Summary ===');
          console.log(JSON.stringify(summary));
          const fs2 = require('fs');
          fs2.appendFileSync(process.env.GITHUB_OUTPUT, 'summary=' + JSON.stringify(summary) + '\n');
          fs2.appendFileSync(process.env.GITHUB_OUTPUT, 'has_critical_or_high=' + ((summary.critical > 0 || summary.high > 0) ? 'true' : 'false') + '\n');
          "
          exit 0

      # ------------------------------------------------------------------
      # 将 npm audit 结果转换为 SARIF 格式并上传
      # ------------------------------------------------------------------
      - name: Convert audit results to SARIF
        if: always()
        run: |
          echo "Creating SARIF file..."

          printf '%s\n' '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"npm-audit","informationUri":"https://docs.npmjs.com/cli/v10/commands/npm-audit","rules":[]},"results":[]}]}' > sarif-npm-audit.json

          if [ -f audit-results.json ] && [ -s audit-results.json ]; then
            echo "Processing audit results..."
            node -e "
            const fs = require('fs');
            let data;
            try { data = JSON.parse(fs.readFileSync('audit-results.json', 'utf8')); }
            catch (e) { console.log('Warning: Could not parse audit-results.json'); data = { vulnerabilities: {} }; }
            const sarif = JSON.parse(fs.readFileSync('sarif-npm-audit.json', 'utf8'));
            const ruleIndex = {};
            const results = [];
            function addVulnerability(pkg, vuln, severity) {
              const ruleId = 'npm-' + pkg.replace(/[^a-zA-Z0-9_-]/g, '-');
              if (!ruleIndex[ruleId]) {
                ruleIndex[ruleId] = sarif.runs[0].tool.driver.rules.length;
                sarif.runs[0].tool.driver.rules.push({
                  id: ruleId,
                  shortDescription: { text: vuln.title || ('Vulnerability in ' + pkg) },
                  fullDescription: { text: vuln.overview || '' },
                  help: {
                    text: ['Package:', pkg, 'Severity:', severity.toUpperCase(), 'Fix:', (vuln.fixAvailable === false ? 'No fix available' : vuln.fixAvailable && vuln.fixAvailable.version ? 'Update to ' + vuln.fixAvailable.version : 'Run npm audit fix')].join(' ')
                  },
                  properties: { 'security-severity': getSeverityScore(severity), tags: ['dependency', 'vulnerability', severity] }
                });
              }
              results.push({
                ruleId: ruleId, level: getLevel(severity),
                message: { text: (vuln.title || 'Dependency vulnerability') + ' [' + severity.toUpperCase() + ']' },
                locations: [{ physicalLocation: { artifactLocation: { uri: 'package.json' }, region: { startLine: 1, endLine: 1 } } }],
                properties: { package: pkg, severity: severity, vulnerableVersions: vuln.range || 'N/A', patchedVersions: vuln.fixAvailable && vuln.fixAvailable.version ? vuln.fixAvailable.version : 'N/A' }
              });
            }
            function getSeverityScore(sev) { return ({ critical: '9.8', high: '7.5', moderate: '5.0', low: '2.0' })[sev.toLowerCase()] || '1.0'; }
            function getLevel(sev) { const s = sev.toLowerCase(); return s === 'critical' || s === 'high' ? 'error' : s === 'moderate' ? 'warning' : 'note'; }
            if (data.vulnerabilities) { for (const [pkg, vuln] of Object.entries(data.vulnerabilities)) addVulnerability(pkg, vuln, vuln.severity); }
            sarif.runs[0].results = results;
            fs.writeFileSync('sarif-npm-audit.json', JSON.stringify(sarif, null, 2));
            console.log('Generated SARIF with ' + results.length + ' findings');
            "
          else
            echo "No audit results file found or file is empty"
            echo "SARIF file created with empty results (template only)"
          fi

          echo "SARIF file ready: $(ls -la sarif-npm-audit.json | awk '{print $5}')"

      - name: Upload npm audit results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-npm-audit.json
          category: npm-audit
        continue-on-error: true

      # ------------------------------------------------------------------
      # 在 PR 中添加安全扫描结果注释
      # ------------------------------------------------------------------
      - name: Comment on PR with audit results
        if: github.event_name == 'pull_request' && steps.npm-audit.outcome != 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = '${{ steps.npm-audit.outputs.summary }}';
            const hasCriticalHigh = '${{ steps.npm-audit.outputs.has_critical_or_high }}' === 'true';
            const data = JSON.parse(summary);
            
            const body = `## ⚠️ Dependency Security Audit Report
            
            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${data.critical || 0} |
            | 🟠 High | ${data.high || 0} |
            | 🟡 Moderate | ${data.moderate || 0} |
            | 🟢 Low | ${data.low || 0} |
            | ℹ️ Info | ${data.info || 0} |
            | **Total** | **${data.total || 0}** |
            
            ---
            ${hasCriticalHigh ? '**Action Required:** Critical or high severity vulnerabilities detected! Please review and update affected dependencies.' : '✅ No critical or high severity vulnerabilities found.'}
            
            > Run \`npm audit fix\` to automatically fix fixable vulnerabilities.
            > For detailed report, check the **Security** tab or download the artifact.`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Dependency Security Audit Report')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Generate detailed vulnerability report
        if: always()
        run: |
          echo "## Dependency Vulnerability Detailed Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "audit-results.json" ]; then
            node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('audit-results.json', 'utf8'));
            const vulns = data.vulnerabilities || {};
            const meta = data.metadata || {};
            const summary = meta.vulnerabilities || {};
            const totalVulns = summary.total || 0;
            const L = [];
            L.push('### Vulnerability Overview\n');
            L.push('| Severity | Count | Action Required |');
            L.push('|----------|-------|----------------|');
            L.push('| Critical | ' + (summary.critical || 0) + ' | Immediate Fix |');
            L.push('| High | ' + (summary.high || 0) + ' | High Priority |');
            L.push('| Moderate | ' + (summary.moderate || 0) + ' | Schedule Fix |');
            L.push('| Low | ' + (summary.low || 0) + ' | Optional |');
            L.push('| Info | ' + (summary.info || 0) + ' | None |');
            L.push('| **Total** | **' + totalVulns + '**' + ' |\n');
            const critical=[], high=[];
            for (const [pkg, v] of Object.entries(vulns)) { const item={package:pkg,...v}, s=(v.severity||'').toLowerCase(); if(s==='critical') critical.push(item); else if(s==='high') high.push(item); }
            if(critical.length>0){L.push('### Critical Vulnerabilities (Immediate Action Required)\n');for(const v of critical){L.push('#### '+v.package+(v.isDirect?' *(direct)*':' *(transitive)*'));L.push('- **Severity**: Critical');L.push('- **Affected Range**: '+(v.range||'N/A'));if(Array.isArray(v.via))for(const c of v.via){if(typeof c==='object'){L.push('- **CVE**: ['+(c.name||'N/A')+']('+((c.url||'#'))+')');L.push('  - **Title**: '+(c.title||''));L.push('  - **CWE**: '+((c.cwe||[]).join(', ')));}}L.push('- **Fix Available**: '+(v.fixAvailable?'Yes':'No'));if(v.fixAvailable&&v.fixAvailable.version)L.push('  - **Recommended Version**: \`'+v.fixAvailable.version+'\`');L.push('');}}
            if(high.length>0){L.push('### High Severity Vulnerabilities\n');for(const v of high.slice(0,10)){const cves=Array.isArray(v.via)?v.via.filter(c=>typeof c==='object'):[];const topCVE=cves[0];L.push('**'+v.package+'**'+(v.isDirect?' *(direct)*':' *(transitive)*'));if(topCVE){L.push('- \`'+(topCVE.title||'').substring(0,80)+'\`');L.push('- CVSS: '+(topCVE.cvss?.score||'N/A')+' | CWE: '+((topCVE.cwe||[]).join(',')));}L.push('- Fix: '+(v.fixAvailable?.version||'Upgrade required')+'\n');}if(high.length>10)L.push('*... and '+(high.length-10)+' more high severity vulnerabilities*\n');}
            L.push('### Remediation Recommendations\n');
            L.push('#### Priority Actions:\n');
            L.push('1. Critical/High Direct Dependencies:\n   - Run npm update to patch to safe version\n2. Transitive Dependencies:\n   - Use npm audit fix to auto-fix where possible\n3. Monitor & Review:\n   - Check GitHub Security tab for this repository\n');
            const hasCriticalHigh=(summary.critical||0)>0||(summary.high||0)>0;
            if(hasCriticalHigh){L.push('---\n### Security Check Failed\n'+totalVulns+' vulnerabilities detected ('+(summary.critical||0)+' critical, '+(summary.high||0)+' high).\n');}else{L.push('---\n### Security Check Passed\nNo critical or high severity vulnerabilities found.\n');}
            process.stdout.write(L.join('\n'));
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "No audit results file found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for critical/high vulnerabilities
        if: always()
        run: |
          HAS_CRITICAL_HIGH="${{ steps.npm-audit.outputs.has_critical_or_high }}"
          
          if [ "$HAS_CRITICAL_HIGH" = "true" ]; then
            echo "::warning::Critical or high severity vulnerabilities detected! Please review and fix when possible."
            echo "⚠️ Critical or high severity vulnerabilities detected (non-blocking)"
            # Don't fail the workflow - just warn
          else
            echo "✓ No critical or high severity vulnerabilities found."
          fi
          
          exit 0

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: |
            audit-results.json
            sarif-npm-audit.json
          retention-days: 14
          if-no-files-found: ignore

  # ==========================================================================
  # Job 2: CodeQL 静态代码安全分析
  # ==========================================================================
  codeql-analyze:
    name: CodeQL Analysis (${{ github.event_name == 'schedule' || inputs.full_scan == 'true' && 'Deep' || 'Standard' }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event_name == 'schedule' || inputs.full_scan == 'true' && 60 || 30 }}

    needs: dependency-audit
    if: ${{ github.event_name != 'pull_request' }}

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript']
        include:
          - language: javascript
            build-mode: autobuild
          - language: typescript
            build-mode: autobuild

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: ${{ (github.event_name == 'schedule' || inputs.full_scan == 'true') &&
            'security-extended,security-and-quality' ||
            'security-extended' }}
          tools: latest

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        env:
          NODE_ENV: production

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          output: sarif-results-${{ matrix.language }}
          upload-database: true
          wait-for-processing: true

      - name: Export analysis summary
        if: always()
        run: |
          echo "=== CodeQL Analysis Complete ==="
          echo "Language: ${{ matrix.language }}"
          echo "Build Mode: ${{ matrix.build-mode }}"
          echo "Scan Type: ${{ (github.event_name == 'schedule' || inputs.full_scan == 'true') && 'Full Deep Scan' || 'Standard Security Scan' }}"
          echo ""
          echo "Results have been uploaded to the GitHub Security tab."

  # ==========================================================================
  # Job 3: 安全扫描汇总
  # ==========================================================================
  security-summary:
    name: Security Summary & Notifications
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [dependency-audit, codeql-analyze]
    if: always()

    steps:
      - name: Generate security summary
        run: |
          DEP_STATUS="${{ needs.dependency-audit.result }}"
          CODEQL_STATUS="${{ needs.codeql-analyze.result }}"

          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | $DEP_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL Analysis | $CODEQL_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$DEP_STATUS" == "failure" || "$CODEQL_STATUS" == "failure" ]]; then
            echo "### ⚠️ Issues Detected (Non-blocking)" >> $GITHUB_STEP_SUMMARY
            echo "One or more security checks found issues. Please review the detailed reports." >> $GITHUB_STEP_SUMMARY
            # Don't fail - just report
          else
            echo "### ✅ All Security Checks Passed" >> $GITHUB_STEP_SUMMARY
            echo "No critical security issues detected." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Final status check
        run: |
          # Always succeed - security issues are reported but non-blocking
          echo "::notice::Security scan completed. Please review reports for any issues."
          exit 0
